<svg viewBox="0 0 1200 700" xmlns="http://www.w3.org/2000/svg" preserveAspectRatio="xMidYMid meet" role="img" aria-label="Dom budujący się ze scrollem">
  <defs>
    <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#cfe1f0"/>
      <stop offset="100%" stop-color="#f3ede2"/>
    </linearGradient>
    <linearGradient id="ground" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9eb37a"/>
      <stop offset="100%" stop-color="#7a8c5b"/>
    </linearGradient>
    <linearGradient id="concrete" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#9aa0a6"/>
      <stop offset="100%" stop-color="#5e6469"/>
    </linearGradient>
    <linearGradient id="wall" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#e9c79b"/>
      <stop offset="100%" stop-color="#c89a66"/>
    </linearGradient>
    <linearGradient id="roof" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#3a2a23"/>
      <stop offset="100%" stop-color="#5a3d2f"/>
    </linearGradient>
    <linearGradient id="window-glow" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0%" stop-color="#fff4c4"/>
      <stop offset="100%" stop-color="#ffd86b"/>
    </linearGradient>
    <pattern id="brick" x="0" y="0" width="40" height="20" patternUnits="userSpaceOnUse">
      <rect width="40" height="20" fill="url(#wall)"/>
      <line x1="0" y1="10" x2="40" y2="10" stroke="#a87c4f" stroke-width="0.8" opacity="0.45"/>
      <line x1="20" y1="0" x2="20" y2="10" stroke="#a87c4f" stroke-width="0.8" opacity="0.45"/>
      <line x1="0" y1="10" x2="0" y2="20" stroke="#a87c4f" stroke-width="0.8" opacity="0.45"/>
      <line x1="40" y1="10" x2="40" y2="20" stroke="#a87c4f" stroke-width="0.8" opacity="0.45"/>
    </pattern>
  </defs>

  <!-- niebo -->
  <rect class="layer-sky" width="1200" height="520" fill="url(#sky)"/>

  <!-- chmury (parallax) -->
  <g class="layer-clouds" fill="#ffffff" opacity="0.85">
    <g class="cloud cloud-1" transform="translate(120,90)">
      <ellipse cx="0" cy="0" rx="60" ry="18"/>
      <ellipse cx="35" cy="-8" rx="40" ry="16"/>
      <ellipse cx="-30" cy="-6" rx="35" ry="14"/>
    </g>
    <g class="cloud cloud-2" transform="translate(820,140)">
      <ellipse cx="0" cy="0" rx="80" ry="22"/>
      <ellipse cx="50" cy="-10" rx="45" ry="18"/>
      <ellipse cx="-40" cy="-6" rx="38" ry="16"/>
    </g>
    <g class="cloud cloud-3" transform="translate(500,60)">
      <ellipse cx="0" cy="0" rx="55" ry="16"/>
      <ellipse cx="30" cy="-6" rx="38" ry="14"/>
    </g>
  </g>

  <!-- słońce -->
  <circle class="layer-sun" cx="1020" cy="120" r="50" fill="#FFD23F" opacity="0.9"/>
  <circle class="layer-sun-glow" cx="1020" cy="120" r="80" fill="#FFD23F" opacity="0.18"/>

  <!-- ziemia -->
  <rect class="layer-ground" y="520" width="1200" height="180" fill="url(#ground)"/>
  <path class="layer-ground-detail" d="M 0 520 Q 300 510 600 522 T 1200 520 L 1200 540 L 0 540 Z" fill="#88a062" opacity="0.5"/>

  <!-- drzewo po lewej -->
  <g class="layer-tree" transform="translate(140,470)">
    <rect x="-6" y="0" width="12" height="60" fill="#5a3d2f"/>
    <circle cx="0" cy="-10" r="42" fill="#6a8a3f"/>
    <circle cx="-22" cy="0" r="30" fill="#7a9c4a"/>
    <circle cx="22" cy="-2" r="28" fill="#7a9c4a"/>
  </g>

  <!-- koparka -->
  <g class="layer-excavator" transform="translate(-260,460)">
    <rect x="0" y="20" width="120" height="40" rx="4" fill="#FFD23F"/>
    <rect x="20" y="-10" width="60" height="35" rx="3" fill="#FFD23F"/>
    <rect x="30" y="-2" width="40" height="20" fill="#1A1D24" opacity="0.7"/>
    <circle cx="20" cy="65" r="14" fill="#1A1D24"/>
    <circle cx="20" cy="65" r="6" fill="#5e6469"/>
    <circle cx="60" cy="65" r="14" fill="#1A1D24"/>
    <circle cx="60" cy="65" r="6" fill="#5e6469"/>
    <circle cx="100" cy="65" r="14" fill="#1A1D24"/>
    <circle cx="100" cy="65" r="6" fill="#5e6469"/>
    <line class="excavator-arm" x1="80" y1="0" x2="160" y2="40" stroke="#FFD23F" stroke-width="10" stroke-linecap="round"/>
    <path d="M 155 35 L 175 35 L 180 55 L 155 50 Z" fill="#1A1D24"/>
  </g>

  <!-- wykop -->
  <g class="layer-excavation">
    <path d="M 380 520 L 420 580 L 800 580 L 840 520 Z" fill="#3d2f24"/>
    <ellipse cx="610" cy="520" rx="220" ry="6" fill="#1a120a" opacity="0.4"/>
  </g>

  <!-- fundament (beton) -->
  <g class="layer-foundation">
    <rect x="380" y="490" width="460" height="50" fill="url(#concrete)"/>
    <rect x="380" y="490" width="460" height="6" fill="#FFD23F" opacity="0.8"/>
    <line x1="395" y1="500" x2="825" y2="500" stroke="#3a3a3a" stroke-width="1" opacity="0.4"/>
    <line x1="395" y1="515" x2="825" y2="515" stroke="#3a3a3a" stroke-width="1" opacity="0.4"/>
    <line x1="395" y1="530" x2="825" y2="530" stroke="#3a3a3a" stroke-width="1" opacity="0.4"/>
  </g>

  <!-- ściany - kilka rzędów cegieł -->
  <g class="layer-walls">
    <g class="brick-row" data-row="0"><rect x="400" y="460" width="420" height="30" fill="url(#brick)"/></g>
    <g class="brick-row" data-row="1"><rect x="400" y="430" width="420" height="30" fill="url(#brick)"/></g>
    <g class="brick-row" data-row="2"><rect x="400" y="400" width="420" height="30" fill="url(#brick)"/></g>
    <g class="brick-row" data-row="3"><rect x="400" y="370" width="420" height="30" fill="url(#brick)"/></g>
    <g class="brick-row" data-row="4"><rect x="400" y="340" width="420" height="30" fill="url(#brick)"/></g>
    <g class="brick-row" data-row="5"><rect x="400" y="310" width="420" height="30" fill="url(#brick)"/></g>
    <rect class="wall-edge-left" x="400" y="310" width="6" height="180" fill="#a87c4f" opacity="0.55"/>
    <rect class="wall-edge-right" x="814" y="310" width="6" height="180" fill="#a87c4f" opacity="0.55"/>
  </g>

  <!-- drzwi -->
  <g class="layer-door">
    <rect x="580" y="390" width="60" height="100" fill="#3a2a23" rx="2"/>
    <rect x="585" y="395" width="50" height="90" fill="#5a3d2f" rx="1"/>
    <circle cx="628" cy="445" r="2.5" fill="#FFD23F"/>
    <rect x="588" y="402" width="44" height="32" fill="#1f1610" opacity="0.4"/>
  </g>

  <!-- okna parteru -->
  <g class="layer-windows window-ground">
    <g class="window window-left" transform="translate(450,395)">
      <rect width="80" height="70" fill="#1A1D24"/>
      <rect x="3" y="3" width="74" height="64" fill="url(#window-glow)" opacity="0"/>
      <line x1="40" y1="0" x2="40" y2="70" stroke="#1A1D24" stroke-width="3"/>
      <line x1="0" y1="35" x2="80" y2="35" stroke="#1A1D24" stroke-width="3"/>
      <rect width="80" height="70" fill="none" stroke="#3a2a23" stroke-width="3"/>
    </g>
    <g class="window window-right" transform="translate(690,395)">
      <rect width="80" height="70" fill="#1A1D24"/>
      <rect x="3" y="3" width="74" height="64" fill="url(#window-glow)" opacity="0"/>
      <line x1="40" y1="0" x2="40" y2="70" stroke="#1A1D24" stroke-width="3"/>
      <line x1="0" y1="35" x2="80" y2="35" stroke="#1A1D24" stroke-width="3"/>
      <rect width="80" height="70" fill="none" stroke="#3a2a23" stroke-width="3"/>
    </g>
  </g>

  <!-- dach -->
  <g class="layer-roof">
    <polygon points="380,310 610,180 840,310" fill="url(#roof)"/>
    <polygon points="380,310 610,180 840,310" fill="none" stroke="#1f1410" stroke-width="2"/>
    <line x1="430" y1="280" x2="500" y2="225" stroke="#2a1a13" stroke-width="1" opacity="0.5"/>
    <line x1="490" y1="280" x2="560" y2="225" stroke="#2a1a13" stroke-width="1" opacity="0.5"/>
    <line x1="550" y1="280" x2="610" y2="230" stroke="#2a1a13" stroke-width="1" opacity="0.5"/>
    <line x1="610" y1="230" x2="670" y2="280" stroke="#2a1a13" stroke-width="1" opacity="0.5"/>
    <line x1="660" y1="225" x2="730" y2="280" stroke="#2a1a13" stroke-width="1" opacity="0.5"/>
    <line x1="720" y1="225" x2="790" y2="280" stroke="#2a1a13" stroke-width="1" opacity="0.5"/>
    <rect x="370" y="305" width="480" height="12" fill="#2a1a13"/>
  </g>

  <!-- okno strychu -->
  <g class="layer-attic-window">
    <polygon points="588,260 632,260 620,235 600,235" fill="#1A1D24"/>
    <polygon points="592,256 628,256 618,239 602,239" fill="url(#window-glow)" opacity="0"/>
  </g>

  <!-- komin -->
  <g class="layer-chimney">
    <rect x="720" y="200" width="32" height="60" fill="#7a4a36"/>
    <rect x="715" y="195" width="42" height="10" fill="#5a3528"/>
  </g>

  <!-- dym -->
  <g class="layer-smoke" fill="#ffffff" opacity="0">
    <circle class="smoke smoke-1" cx="736" cy="180" r="10"/>
    <circle class="smoke smoke-2" cx="744" cy="155" r="13"/>
    <circle class="smoke smoke-3" cx="730" cy="125" r="16"/>
  </g>

  <!-- lampka nad drzwiami -->
  <g class="layer-porch-light" opacity="0">
    <circle cx="610" cy="385" r="18" fill="#FFD23F" opacity="0.4"/>
    <circle cx="610" cy="385" r="6" fill="#fff4c4"/>
  </g>
</svg>
