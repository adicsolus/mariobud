<svg viewBox="0 0 600 600" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="Mapa Polski z realizacjami MarioBud">
  <defs>
    <pattern id="map-grid" width="20" height="20" patternUnits="userSpaceOnUse">
      <path d="M 20 0 L 0 0 L 0 20" fill="none" stroke="#1A1D24" stroke-width="0.3" opacity="0.15"/>
    </pattern>
    <filter id="pin-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="2"/>
      <feOffset dx="0" dy="2" result="off"/>
      <feComponentTransfer><feFuncA type="linear" slope="0.4"/></feComponentTransfer>
      <feMerge><feMergeNode/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>

  <rect width="600" height="600" fill="url(#map-grid)"/>

  <!-- stylizowany kontur Polski (uproszczony) -->
  <path class="poland-outline"
        d="M 95 160
           Q 130 130 175 120
           L 240 100
           Q 290 88 340 92
           L 410 105
           Q 460 115 495 145
           Q 520 180 525 220
           L 528 270
           Q 525 320 510 360
           Q 495 395 470 425
           L 440 455
           Q 405 478 360 482
           L 290 480
           Q 240 478 200 460
           L 160 440
           Q 120 410 100 370
           L 85 320
           Q 75 270 80 220
           Q 82 188 95 160 Z"
        fill="#f1ede4"
        stroke="#1A1D24"
        stroke-width="2.5"
        stroke-linejoin="round"/>

  <!-- linie rzek (dekoracja) -->
  <path d="M 320 110 Q 310 200 280 290 Q 260 360 250 470" fill="none" stroke="#7da4c4" stroke-width="1.5" opacity="0.55"/>
  <path d="M 200 460 Q 230 410 280 380" fill="none" stroke="#7da4c4" stroke-width="1.2" opacity="0.4"/>

  <!-- piny -->
  <g class="map-pins" filter="url(#pin-shadow)">
    <g class="map-pin" data-city="Warszawa" data-tip="Apartamentowiec — wykończenie pod klucz" transform="translate(340,250)">
      <path d="M 0 0 C -10 -22 10 -22 0 0 Z M 0 -8 C -8 -8 -8 -20 0 -20 C 8 -20 8 -8 0 -8 Z" fill="#1A1D24"/>
      <circle cx="0" cy="-14" r="4" fill="#FFD23F"/>
    </g>
    <g class="map-pin" data-city="Kraków" data-tip="Gładzie maszynowe — 380 m²" transform="translate(310,400)">
      <path d="M 0 0 C -10 -22 10 -22 0 0 Z M 0 -8 C -8 -8 -8 -20 0 -20 C 8 -20 8 -8 0 -8 Z" fill="#1A1D24"/>
      <circle cx="0" cy="-14" r="4" fill="#FFD23F"/>
    </g>
    <g class="map-pin" data-city="Gdańsk" data-tip="Dom pod klucz — 165 m²" transform="translate(320,135)">
      <path d="M 0 0 C -10 -22 10 -22 0 0 Z M 0 -8 C -8 -8 -8 -20 0 -20 C 8 -20 8 -8 0 -8 Z" fill="#1A1D24"/>
      <circle cx="0" cy="-14" r="4" fill="#FFD23F"/>
    </g>
    <g class="map-pin" data-city="Poznań" data-tip="Stan deweloperski — osiedle" transform="translate(195,235)">
      <path d="M 0 0 C -10 -22 10 -22 0 0 Z M 0 -8 C -8 -8 -8 -20 0 -20 C 8 -20 8 -8 0 -8 Z" fill="#1A1D24"/>
      <circle cx="0" cy="-14" r="4" fill="#FFD23F"/>
    </g>
    <g class="map-pin" data-city="Wrocław" data-tip="Fundament + stan surowy" transform="translate(205,350)">
      <path d="M 0 0 C -10 -22 10 -22 0 0 Z M 0 -8 C -8 -8 -8 -20 0 -20 C 8 -20 8 -8 0 -8 Z" fill="#1A1D24"/>
      <circle cx="0" cy="-14" r="4" fill="#FFD23F"/>
    </g>
    <g class="map-pin" data-city="Olsztyn" data-tip="Dom letniskowy — Mazury" transform="translate(380,165)">
      <path d="M 0 0 C -10 -22 10 -22 0 0 Z M 0 -8 C -8 -8 -8 -20 0 -20 C 8 -20 8 -8 0 -8 Z" fill="#1A1D24"/>
      <circle cx="0" cy="-14" r="4" fill="#FFD23F"/>
    </g>
    <g class="map-pin" data-city="Lublin" data-tip="Fundamenty — 4 budynki" transform="translate(440,290)">
      <path d="M 0 0 C -10 -22 10 -22 0 0 Z M 0 -8 C -8 -8 -8 -20 0 -20 C 8 -20 8 -8 0 -8 Z" fill="#1A1D24"/>
      <circle cx="0" cy="-14" r="4" fill="#FFD23F"/>
    </g>
    <g class="map-pin" data-city="Rzeszów" data-tip="Hala produkcyjna" transform="translate(430,420)">
      <path d="M 0 0 C -10 -22 10 -22 0 0 Z M 0 -8 C -8 -8 -8 -20 0 -20 C 8 -20 8 -8 0 -8 Z" fill="#1A1D24"/>
      <circle cx="0" cy="-14" r="4" fill="#FFD23F"/>
    </g>
    <g class="map-pin" data-city="Szczecin" data-tip="Bliźniak deweloperski" transform="translate(95,180)">
      <path d="M 0 0 C -10 -22 10 -22 0 0 Z M 0 -8 C -8 -8 -8 -20 0 -20 C 8 -20 8 -8 0 -8 Z" fill="#1A1D24"/>
      <circle cx="0" cy="-14" r="4" fill="#FFD23F"/>
    </g>
    <g class="map-pin map-pin-egg" data-city="Bałtyk" data-tip="Coming soon — prowizja jednak za niska" transform="translate(280,40)">
      <path d="M 0 0 C -10 -22 10 -22 0 0 Z M 0 -8 C -8 -8 -8 -20 0 -20 C 8 -20 8 -8 0 -8 Z" fill="#FFD23F"/>
      <circle cx="0" cy="-14" r="4" fill="#1A1D24"/>
    </g>
  </g>

  <!-- legenda -->
  <g class="map-legend" transform="translate(420,540)" font-family="Inter, system-ui, sans-serif" font-size="11" fill="#1A1D24">
    <circle cx="0" cy="-4" r="5" fill="#FFD23F" stroke="#1A1D24" stroke-width="1"/>
    <text x="12" y="0">realizacje 2018–2026</text>
  </g>
</svg>
